name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - run: flutter pub get

      - run: echo "$FIREBASE_OPTIONS" > lib/firebase_options.dart
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS_DART }}

      - run: echo "$DOT_ENV" > .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}

      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release --pwa-strategy=none --dart-define=LOGGER_API_KEY=${{ secrets.LOGGER_API_KEY }}
      - run: rm -f build/web/flutter_service_worker.js

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: timetable-maker-3c8e0
          channelId: live
          # Newer firebase-tools handles the "premature close" release retry
          # gracefully (avoids the false FAILED_PRECONDITION on re-POST).
          firebaseToolsVersion: latest

