<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Create and manage your personalized timetables with ease. A powerful, intuitive timetable creator for BITS Pilani students.">
  <meta name="keywords" content="timetable, schedule, planner, academic, education, BITS Pilani, tabulr">
  <meta name="author" content="Tabulr">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- PWA theme color -->
  <meta name="theme-color" content="#58A6FF">
  <meta name="color-scheme" content="dark light">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tabulr">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Tabulr</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #0d1117; overscroll-behavior-x: none; }
    .loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
    }
    .loading span {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; color: #8b949e; letter-spacing: 0.5px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #21262d;
      border-top-color: #58A6FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: light) {
      body { background: #fff; }
      .spinner { border-color: #d0d7de; border-top-color: #58A6FF; }
      .loading span { color: #656d76; }
    }
  </style>
  <script src="https://www.google.com/recaptcha/enterprise.js?render=6LeXHQ0tAAAAAKF6s3MnZGKsm9MMzbbU8rHwjmwJ"></script>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Loading Tabulr...</span>
  </div>

  <script>
    (async function() {
      var version = '';
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var r of regs) await r.unregister();
        }

        var resp = await fetch('version.json?t=' + Date.now());
        var data = await resp.json();
        version = data.version || '';
        var prev = localStorage.getItem('app_version');

        if (prev && prev !== version) {
          var keys = await caches.keys();
          for (var k of keys) await caches.delete(k);
          localStorage.setItem('app_version', version);
          window.location.reload();
          return;
        }
        localStorage.setItem('app_version', version);
      } catch(e) {}

      // Load Flutter bootstrap with version query param for cache busting
      var s = document.createElement('script');
      s.src = 'flutter_bootstrap.js' + (version ? '?v=' + encodeURIComponent(version) : '?t=' + Date.now());
      s.async = true;
      document.body.appendChild(s);
    })();
  </script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
</body>
</html>
