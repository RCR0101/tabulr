<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Create and manage your personalized timetables with ease. A powerful, intuitive timetable creator for BITS Pilani students.">
  <meta name="keywords" content="timetable, schedule, planner, academic, education, BITS Pilani, tabulr">
  <meta name="author" content="Tabulr">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA theme color -->
  <meta name="theme-color" content="#58A6FF">
  <meta name="color-scheme" content="dark light">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tabulr">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Tabulr</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #0d1117; overscroll-behavior-x: none; }
    .loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
    }
    .loading span {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; color: #8b949e; letter-spacing: 0.5px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #21262d;
      border-top-color: #58A6FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: light) {
      body { background: #fff; }
      .spinner { border-color: #d0d7de; border-top-color: #58A6FF; }
      .loading span { color: #656d76; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Loading Tabulr...</span>
  </div>

  <script>
    // Warm the engine download in parallel with the version check below. The
    // check gates the real bootstrap injection (to avoid a flash-then-reload
    // right after a deploy), which otherwise costs one round trip before the
    // engine starts downloading. This preload uses the last known version — the
    // same URL the common, version-unchanged path injects — so the browser
    // reuses these bytes instead of fetching twice, hiding the RTT. On a first
    // visit or a version change it simply does nothing useful and is discarded.
    (function() {
      var prev = localStorage.getItem('app_version');
      if (prev) {
        var l = document.createElement('link');
        l.rel = 'preload';
        l.as = 'script';
        l.href = 'flutter_bootstrap.js?v=' + encodeURIComponent(prev);
        document.head.appendChild(l);
      }
    })();
  </script>

  <script>
    // Boot watchdog. The app's own caches self-heal (a bad entry is caught and
    // re-fetched), but Firestore's IndexedDB persistence is owned by the SDK
    // with no such guard — a corrupt or wedged store (seen on privacy-hardened
    // browsers like Brave) can make startup hang before it ever paints. We
    // count boots that never reach first frame; after two, we assume local
    // state is the problem and purge everything (IndexedDB incl. Firestore,
    // Cache Storage, service workers, localStorage) before booting clean. A
    // healthy boot clears the counter on first frame, so this never runs when
    // things are working, and an intentional post-deploy reload resets it too.
    var BOOT_FAIL_KEY = 'boot_fails';
    var BOOT_FAIL_LIMIT = 2;

    async function purgeLocalState() {
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var r of regs) await r.unregister();
        }
      } catch (e) {}
      try {
        var keys = await caches.keys();
        for (var k of keys) await caches.delete(k);
      } catch (e) {}
      try {
        if (indexedDB.databases) {
          var dbs = await indexedDB.databases();
          await Promise.all(dbs.map(function (db) {
            return new Promise(function (resolve) {
              try {
                var req = indexedDB.deleteDatabase(db.name);
                req.onsuccess = req.onerror = req.onblocked = function () { resolve(); };
              } catch (e) { resolve(); }
            });
          }));
        }
      } catch (e) {}
      try {
        localStorage.clear();
      } catch (e) {}
    }

    (async function() {
      // Recover from / count a stuck boot before doing anything else.
      var bootFails = 0;
      try { bootFails = parseInt(localStorage.getItem(BOOT_FAIL_KEY) || '0', 10) || 0; } catch (e) {}
      if (bootFails >= BOOT_FAIL_LIMIT) {
        await purgeLocalState();
        try { localStorage.setItem(BOOT_FAIL_KEY, '0'); } catch (e) {}
      } else {
        // Provisionally mark this attempt as unconfirmed; first frame clears it.
        try { localStorage.setItem(BOOT_FAIL_KEY, String(bootFails + 1)); } catch (e) {}
      }

      var version = '';
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var r of regs) await r.unregister();
        }

        // Some browsers/extensions (observed on Brave) silently stall this
        // request instead of failing it. Without a cap the bootstrap script
        // below is never injected and the page hangs on the spinner. Abort
        // after a few seconds and fall through to the cached-version path,
        // which reuses the preloaded engine bytes warmed above.
        var controller = new AbortController();
        var timer = setTimeout(function() { controller.abort(); }, 4000);
        var data;
        try {
          var resp = await fetch('version.json?t=' + Date.now(), {
            signal: controller.signal,
            cache: 'no-store'
          });
          data = await resp.json();
        } finally {
          clearTimeout(timer);
        }
        version = data.version || '';
        var prev = localStorage.getItem('app_version');

        if (prev && prev !== version) {
          var keys = await caches.keys();
          for (var k of keys) await caches.delete(k);
          localStorage.setItem('app_version', version);
          // Intentional reload — don't let the watchdog blame it as a stuck boot.
          try { localStorage.setItem(BOOT_FAIL_KEY, '0'); } catch (e) {}
          window.location.reload();
          return;
        }
        localStorage.setItem('app_version', version);
      } catch(e) {
        // Version check failed or timed out: proceed with the last known
        // version so the engine still boots (and reuses the preloaded bytes).
        try { version = localStorage.getItem('app_version') || ''; } catch(_) {}
      }

      // Load Flutter bootstrap with version query param for cache busting
      var s = document.createElement('script');
      s.src = 'flutter_bootstrap.js' + (version ? '?v=' + encodeURIComponent(version) : '?t=' + Date.now());
      s.async = true;
      document.body.appendChild(s);
    })();
  </script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      // Boot reached first frame — clear the watchdog's failure counter.
      try { localStorage.removeItem(BOOT_FAIL_KEY); } catch (e) {}
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
</body>
</html>
